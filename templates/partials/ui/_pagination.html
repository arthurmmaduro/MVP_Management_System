<nav aria-label="{{ pagination_aria_label }}">
    {% if page_obj.has_previous %}
        <a href="?page=1{{ pagination_query }}">Primeira</a>
        <a href="?page={{ page_obj.previous_page_number }}{{ pagination_query }}">Anterior</a>
    {% endif %}
    <span>Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{{ pagination_query }}">Próxima</a>
        <a href="?page={{ page_obj.paginator.num_pages }}{{ pagination_query }}">Última</a>
    {% endif %}
</nav>
